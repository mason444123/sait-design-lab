<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Магазин Custom</title>
  <meta name="description" content="Магазин проекта Custom: футболки Custom в нескольких цветах.">
  <style>
    :root {
      --bg:#070707; --card:rgba(255,255,255,.06); --line:rgba(255,243,230,.12); --text:#fff3e6;
      --muted:rgba(255,243,230,.72); --orange:#ff9b3d; --orange2:#ff6f47; --panel:rgba(18,10,8,.92);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-track{background:#0a0807}
    ::-webkit-scrollbar-thumb{background:rgba(255,138,42,.3);border-radius:6px;border:2px solid #0a0807}
    ::-webkit-scrollbar-thumb:hover{background:rgba(255,138,42,.5)}
    *{scrollbar-width:thin;scrollbar-color:rgba(255,138,42,.3) #0a0807}
    html{min-height:100%;scroll-behavior:smooth;background:#070707}
    body{min-height:100vh;min-height:100svh;background:#070707;color:var(--text);font-family:Arial,Helvetica,sans-serif;overflow-x:hidden;position:relative}
    .aurora-wrap{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
    .aurora{position:absolute;border-radius:50%;filter:blur(70px);will-change:transform,opacity}
    .aurora-1{width:60vw;height:60vw;top:-10%;left:-10%;background:radial-gradient(circle,#ff9b3d,transparent 60%);animation:flash1 8s ease-in-out infinite}
    .aurora-2{width:55vw;height:55vw;top:40%;right:-12%;background:radial-gradient(circle,#ff6f47,transparent 60%);animation:flash2 11s ease-in-out infinite}
    .aurora-3{width:45vw;height:45vw;bottom:-12%;left:20%;background:radial-gradient(circle,#ff5a3c,transparent 60%);animation:flash3 9s ease-in-out infinite}
    .aurora-4{width:40vw;height:40vw;top:15%;right:10%;background:radial-gradient(circle,#ffb15f,transparent 60%);animation:flash4 13s ease-in-out infinite}
    .aurora-5{width:35vw;height:35vw;top:50%;left:30%;background:radial-gradient(circle,#ff8a2a,transparent 60%);animation:flash5 7s ease-in-out infinite}
    @keyframes flash1{0%,100%{opacity:0;transform:translate(0,0) scale(.8)}15%{opacity:.9;transform:translate(8vw,5vh) scale(1.2)}40%{opacity:.3;transform:translate(15vw,10vh) scale(1)}60%{opacity:.8;transform:translate(5vw,15vh) scale(1.1)}85%{opacity:.1;transform:translate(-3vw,8vh) scale(.9)}}
    @keyframes flash2{0%,100%{opacity:0;transform:translate(0,0) scale(.9)}20%{opacity:.85;transform:translate(-10vw,-8vh) scale(1.15)}45%{opacity:.2;transform:translate(-5vw,-15vh) scale(1)}65%{opacity:.9;transform:translate(-15vw,-5vh) scale(1.2)}90%{opacity:.15;transform:translate(-8vw,3vh) scale(.95)}}
    @keyframes flash3{0%,100%{opacity:0;transform:translate(0,0) scale(.85)}25%{opacity:.8;transform:translate(12vw,-10vh) scale(1.1)}50%{opacity:.15;transform:translate(20vw,-5vh) scale(1)}70%{opacity:.9;transform:translate(8vw,-15vh) scale(1.2)}95%{opacity:.2;transform:translate(15vw,-8vh) scale(.9)}}
    @keyframes flash4{0%,100%{opacity:0;transform:translate(0,0) scale(.9)}18%{opacity:.7;transform:translate(-8vw,10vh) scale(1.15)}42%{opacity:.25;transform:translate(-15vw,5vh) scale(1)}68%{opacity:.85;transform:translate(-5vw,15vh) scale(1.1)}88%{opacity:.1;transform:translate(-12vw,8vh) scale(.95)}}
    @keyframes flash5{0%,100%{opacity:0;transform:translate(0,0) scale(.8)}30%{opacity:.9;transform:translate(10vw,-12vh) scale(1.2)}55%{opacity:.2;transform:translate(-8vw,-8vh) scale(1)}80%{opacity:.8;transform:translate(15vw,5vh) scale(1.15)}}
    @media(max-width:760px){.aurora{filter:blur(50px)}.aurora-1{width:80vw;height:80vw}.aurora-2{width:75vw;height:75vw}.aurora-3{width:65vw;height:65vw}.aurora-4{width:60vw;height:60vw}.aurora-5{width:55vw;height:55vw}}
    a{color:inherit}
    .top{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:18px clamp(18px,4vw,48px);background:linear-gradient(180deg,rgba(0,0,0,.74),transparent)}
    .brand{font-weight:900;letter-spacing:.14em;text-transform:uppercase;text-decoration:none}
    .back{padding:12px 16px;border:1px solid var(--line);border-radius:999px;text-decoration:none;background:rgba(255,255,255,.04);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
    main{position:relative;z-index:1;width:min(1280px,100%);min-height:100vh;min-height:100svh;margin:0 auto;padding:140px clamp(20px,5vw,56px) 64px}
    .label{color:rgba(255,243,230,.52);font-size:12px;font-weight:900;letter-spacing:.22em;text-transform:uppercase}
    .title{margin-top:18px;font-size:clamp(56px,10vw,132px);line-height:.85;font-weight:1000;letter-spacing:.02em;text-transform:uppercase}
    .lead{max-width:860px;margin-top:24px;color:var(--muted);font-size:clamp(20px,2vw,28px);line-height:1.18}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-top:44px;align-items:stretch}
    @keyframes cardEnter{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    .card{position:relative;display:flex;flex-direction:column;padding:0;border:1px solid rgba(255,243,230,.06);border-radius:24px;background:rgba(255,255,255,.02);cursor:pointer;transition:transform .25s cubic-bezier(.16,1,.3,1),border-color .25s ease,box-shadow .25s ease,filter .25s ease;animation:cardEnter .6s cubic-bezier(.16,1,.3,1) both;overflow:hidden}
    .card:nth-child(2){animation-delay:.08s}
    .card:nth-child(3){animation-delay:.16s}
    .card:nth-child(4){animation-delay:.24s}
    .card:hover{transform:translateY(-6px) scale(1.01);border-color:rgba(255,138,42,.38);box-shadow:0 0 34px rgba(255,138,42,.20),0 22px 55px rgba(0,0,0,.35);filter:brightness(1.06)}
    .card-media{border-radius:0;overflow:hidden;background:#120d0b;aspect-ratio:4/5;transition:transform .3s cubic-bezier(.16,1,.3,1)}
    .card:hover .card-media{transform:scale(1.03)}
    .card-media img{width:100%;height:100%;object-fit:contain;display:block}
    .card-body{padding:20px 18px 22px}
    .card h2{font-size:clamp(22px,2vw,30px);line-height:.95;text-transform:uppercase;font-weight:800;letter-spacing:.01em}

    .product-modal{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:clamp(10px,2vw,22px);background:rgba(0,0,0,0);backdrop-filter:blur(0);opacity:0;pointer-events:none;transition:opacity .28s ease,backdrop-filter .28s ease,background .28s ease}
    .product-modal.open{opacity:1;pointer-events:auto;background:rgba(0,0,0,.72);backdrop-filter:blur(10px)}
    .product-panel{width:min(1040px,100%);max-height:calc(100svh - 24px);overflow:hidden;border-radius:clamp(22px,3vw,30px);border:1px solid rgba(255,243,230,.12);background:linear-gradient(180deg,rgba(24,12,8,.98),rgba(12,10,10,.98));box-shadow:0 30px 120px rgba(0,0,0,.55);padding:clamp(12px,2vw,20px);transform:scale(.95) translateY(24px);opacity:0;transition:transform .34s cubic-bezier(.16,1,.3,1),opacity .3s ease}
    .product-modal.open .product-panel{transform:scale(1) translateY(0);opacity:1}
    .product-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
    .product-eyebrow{display:none;color:rgba(255,243,230,.5);font-size:12px;font-weight:900;letter-spacing:.2em;text-transform:uppercase}
    .product-title{margin-top:0;font-size:clamp(26px,3.2vw,50px);line-height:.9;text-transform:uppercase;font-weight:1000}
    .product-sub{margin-top:6px;color:var(--muted);font-size:clamp(13px,1.4vw,16px);line-height:1.22;max-width:650px}
    .close{width:clamp(38px,4vw,44px);height:clamp(38px,4vw,44px);aspect-ratio:1;border-radius:50%;border:1px solid rgba(255,243,230,.16);background:rgba(255,255,255,.05);color:#fff;font-size:26px;line-height:1;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0;box-shadow:0 4px 18px rgba(0,0,0,.3);transition:background .2s ease,transform .2s ease}
    .close:hover{background:rgba(255,255,255,.12);transform:rotate(90deg)}
    .product-layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(300px,.82fr);gap:clamp(10px,1.6vw,18px);margin-top:clamp(10px,1.6vw,16px);align-items:start}
    .gallery{display:grid;gap:10px;min-height:0}
    .gallery-stage{position:relative;border-radius:clamp(16px,2.4vw,24px);overflow:hidden;background:#120d0b;border:1px solid rgba(255,243,230,.08);height:min(58svh,520px);cursor:pointer}
    .gallery-stage img{width:100%;height:100%;object-fit:contain;display:block;background:#120d0b;transition:opacity .3s ease;touch-action:pan-y}
    .gallery-stage img.fading{opacity:0}
    .product-side{display:flex;flex-direction:column;gap:clamp(8px,1.2vw,12px)}
    .info-card{padding:clamp(10px,1.4vw,16px);border-radius:clamp(14px,1.8vw,20px);border:1px solid rgba(255,243,230,.1);background:rgba(255,255,255,.03)}
    .info-label{color:rgba(255,243,230,.48);font-size:11px;font-weight:900;letter-spacing:.18em;text-transform:uppercase}
    .info-value{margin-top:5px;font-size:clamp(15px,1.8vw,19px);line-height:1.08;font-weight:900;text-transform:uppercase}
    .photo-note{margin-top:6px;color:var(--muted);font-size:clamp(12px,1.2vw,14px);line-height:1.25}
    .buy-btn{display:inline-flex;justify-content:center;align-items:center;padding:clamp(12px,1.5vw,15px) clamp(16px,2.5vw,22px);border-radius:999px;background:linear-gradient(180deg,#ffb15f,#ff8a2a 58%,#d85a12);text-decoration:none;font-weight:900;text-transform:uppercase;letter-spacing:.12em;color:#fff;font-size:clamp(10px,1.2vw,12px);box-shadow:0 18px 40px rgba(216,90,18,.25);transition:transform .2s ease,box-shadow .2s ease,filter .2s ease}
    .buy-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 24px 50px rgba(216,90,18,.35);filter:brightness(1.08)}
    .buy-btn:active{transform:scale(.98)}
    .buy-note{color:rgba(255,243,230,.56);font-size:13px;line-height:1.45}
    @media(max-width:1080px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.product-layout{grid-template-columns:1fr}.product-panel{padding:14px}.gallery-stage{height:min(44svh,420px)}}
    @media(max-width:760px){.grid{grid-template-columns:1fr}.title{font-size:clamp(46px,17vw,82px)}main{padding-top:118px;padding-bottom:46px}.top{padding:14px 18px}.brand{font-size:13px}.back{font-size:11px}.product-modal{padding:8px}.product-panel{border-radius:22px;padding:12px;max-height:calc(100svh - 16px)}.product-top{gap:10px}.product-title{font-size:clamp(26px,8vw,38px)}.product-sub{font-size:12px;line-height:1.15}.product-layout{gap:9px;margin-top:9px}.gallery-stage{height:min(38svh,310px)}.product-side{gap:8px}.info-card{padding:10px 11px;border-radius:14px}.info-label{font-size:9px}.info-value{font-size:14px}.photo-note{font-size:11px;line-height:1.18}.buy-btn{padding:11px 14px;font-size:10px}}
  </style>
</head>
<body>
  <div class="aurora-wrap">
    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>
    <div class="aurora aurora-3"></div>
    <div class="aurora aurora-4"></div>
    <div class="aurora aurora-5"></div>
  </div>
  <header class="top"><a class="brand" href="index.html">Custom</a><a class="back" href="index.html">← На главную</a></header>
  <main>
    <div class="label">Custom store</div>
    <h1 class="title">Магазин проекта</h1>
    
    <div class="grid" id="productGrid"></div>
  </main>

  <div class="product-modal" id="productModal" aria-hidden="true">
    <div class="product-panel" role="dialog" aria-modal="true" aria-labelledby="productTitle">
      <div class="product-top">
        <div>
          <div class="product-eyebrow">Карточка товара</div>
          <div class="product-title" id="productTitle">Футболка Custom</div>
          <div class="product-sub" id="productSub"></div>
        </div>
        <button class="close" id="productClose" aria-label="Закрыть">×</button>
      </div>
      <div class="product-layout">
        <div class="gallery">
          <div class="gallery-stage" id="galleryStage">
            <img id="galleryImage" src="" alt="">

          </div>
        </div>
        <div class="product-side">

          <div class="info-card">
            <div class="info-label">Сторона</div>
            <div class="info-value" id="productSide"></div>
            <div class="photo-note" id="photoNote"></div>
          </div>
          <div class="info-card">
            <div class="info-label">О модели</div>
            <div class="photo-note" id="productDescription"></div>
          </div>
          <a class="buy-btn" id="buyBtn" href="#" target="_blank" rel="noopener">Купить через Telegram</a>
          
        </div>
      </div>
    </div>
  </div>

  <script>
    const products = [
      {
        id: 'orange',

        title: 'Оранжевая',
        color: 'Оранжевая',
        poetry: 'Яркая футболка, говорящая о стиле и красоте.',
        description: 'Самая акцентная футболка в линейке: яркий оранжевый цвет, который сразу читается в кадре, на улице и на вечернем свете.',
        images: [
          { src: 'assets/shop/B2b (orange-top).png', side: 'Передняя сторона', note: 'Оранжевая футболка Custom — передняя сторона. Яркий вариант, который сразу цепляет взгляд и хорошо смотрится в живом движении.' },
          { src: 'assets/shop/B2b (orange-back).png', side: 'Задняя сторона', note: 'Оранжевая футболка Custom — задняя сторона. Сохраняет тот же мощный цвет и выглядит как полноценный мерч, а не просто базовая вещь.' }
        ]
      },
      {
        id: 'black',

        title: 'Чёрная',
        color: 'Чёрная',
        poetry: 'Сильная футболка, говорящая о стиле и красоте.',
        description: 'Чёрная футболка — безопасный и всегда сильный выбор: выглядит собранно, подходит под любой образ и хорошо держит графику.',
        images: [
          { src: 'assets/shop/B2b (black-top).png', side: 'Передняя сторона', note: 'Чёрная футболка Custom — передняя сторона. Самый универсальный вариант для тех, кто любит чистый и уверенный мерч.' },
          { src: 'assets/shop/B2b (black-back).png', side: 'Задняя сторона', note: 'Чёрная футболка Custom — задняя сторона. Сзади выглядит так же цельно и может быть основной вещью, а не просто сувениром.' }
        ]
      },
      {
        id: 'blue',

        title: 'Синяя',
        color: 'Синяя',
        poetry: 'Свежая футболка, говорящая о стиле и красоте.',
        description: 'Синяя футболка выделяется спокойнее, чем оранжевая, но выглядит свежо и нестандартно. Хороший вариант, если хочется цвет, но без перегруза.',
        images: [
          { src: 'assets/shop/B2b (blue-top).png', side: 'Передняя сторона', note: 'Синяя футболка Custom — передняя сторона. Цвет выглядит свежо и чуть более редким, чем стандартные мерчевые решения.' },
          { src: 'assets/shop/B2b (blue-back).png', side: 'Задняя сторона', note: 'Синяя футболка Custom — задняя сторона. Сзади работает так же уверенно и сохраняет яркость образа.' }
        ]
      },
      {
        id: 'white',

        title: 'Белая',
        color: 'Белая',
        poetry: 'Чистая футболка, говорящая о стиле и красоте.',
        description: 'Белая футболка даёт лёгкое летнее ощущение и лучше всего раскрывается днём, на солнце и в чистых casual-образах.',
        images: [
          { src: 'assets/shop/B2b (white-top).png', side: 'Передняя сторона', note: 'Белая футболка Custom — передняя сторона. Чистый летний вариант, который выглядит легко и аккуратно.' },
          { src: 'assets/shop/B2b (white-back).png', side: 'Задняя сторона', note: 'Белая футболка Custom — задняя сторона. Светлый вариант с более воздушным ощущением и хорошей читаемостью.' }
        ]
      }
    ];

    const grid = document.getElementById('productGrid');
    const modal = document.getElementById('productModal');
    const closeBtn = document.getElementById('productClose');
    const titleEl = document.getElementById('productTitle');
    const subEl = document.getElementById('productSub');
        const sideEl = document.getElementById('productSide');
    const noteEl = document.getElementById('photoNote');
    const descEl = document.getElementById('productDescription');
    const galleryImage = document.getElementById('galleryImage');
        const buyBtn = document.getElementById('buyBtn');

    let activeProduct = null;
    let activeIndex = 0;

    function telegramLink(product) {
      const acc = { orange: 'оранжевую', black: 'чёрную', blue: 'синюю', white: 'белую' };
      const text = `Здравствуйте! Хочу заказать ${acc[product.id]} футболку Custom. Подскажите, пожалуйста, по наличию, размерам и дальнейшему оформлению заказа.`;
      return `https://t.me/custom_843?text=${encodeURIComponent(text)}`;
    }

    function renderCards() {
      grid.innerHTML = products.map(product => `
        <article class="card" data-product="${product.id}" tabindex="0" role="button" aria-label="Открыть карточку товара ${product.title}">
          <div class="card-media"><img src="${product.images[0].src}" alt="${product.title} футболка Custom"></div>
          <div class="card-body">
            <h2>${product.title}</h2>
          </div>
        </article>
      `).join('');

      grid.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => openProduct(card.dataset.product));
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openProduct(card.dataset.product);
          }
        });
      });
    }

    function renderGallery() {
      const image = activeProduct.images[activeIndex];
      galleryImage.classList.add('fading');
      setTimeout(() => {
        galleryImage.src = image.src;
        galleryImage.alt = `${activeProduct.title} футболка Custom — ${image.side}`;
        galleryImage.classList.remove('fading');
      }, 180);
      sideEl.textContent = image.side;
      noteEl.textContent = image.note;
    }

    function openProduct(id) {
      activeProduct = products.find(p => p.id === id);
      activeIndex = 0;
      titleEl.textContent = `${activeProduct.title} футболка`;
      subEl.textContent = activeProduct.poetry;
            descEl.textContent = activeProduct.description;
      buyBtn.href = telegramLink(activeProduct);
      renderGallery();
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeProduct() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }



    // Click image to flip front/back
    const galleryStageEl = document.getElementById('galleryStage');
    let clickLock = false;
    galleryStageEl.addEventListener('click', () => {
      if (!activeProduct || clickLock) return;
      clickLock = true;
      activeIndex = (activeIndex + 1) % activeProduct.images.length;
      renderGallery();
      setTimeout(() => { clickLock = false; }, 300);
    });
    let touchStartX = 0, touchStartY = 0, touchMoved = false;
    galleryStageEl.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
      touchMoved = false;
    }, { passive: true });
    galleryStageEl.addEventListener('touchmove', () => { touchMoved = true; }, { passive: true });
    galleryStageEl.addEventListener('touchend', (e) => {
      if (!activeProduct || !touchMoved) return;
      const touchEndX = e.changedTouches[0].screenX;
      const touchEndY = e.changedTouches[0].screenY;
      const dx = touchStartX - touchEndX;
      const dy = touchStartY - touchEndY;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        if (dx > 0) {
          activeIndex = (activeIndex + 1) % activeProduct.images.length;
        } else {
          activeIndex = (activeIndex - 1 + activeProduct.images.length) % activeProduct.images.length;
        }
        renderGallery();
      }
    }, { passive: true });

    closeBtn.addEventListener('click', closeProduct);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeProduct();
    });
    document.addEventListener('keydown', (e) => {
      if (!modal.classList.contains('open')) return;
      if (e.key === 'Escape') closeProduct();
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        if (!activeProduct) return;
        activeIndex = (activeIndex + 1) % activeProduct.images.length;
        renderGallery();
      }
    });

    renderCards();
  </script>
</body>
</html>
